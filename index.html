<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Cronómetro de Competidores</title>

<style>

body{
font-family: Arial;
text-align: center;
background:#f4f4f4;
}

h1{
margin-top:30px;
}

button{
padding:10px;
margin:5px;
font-size:16px;
}

input{
padding:8px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid black;
padding:10px;
}

th{
background:#ddd;
}

</style>

</head>

<body>

<h1>Cronómetro de Competidores</h1>

<button onclick="iniciar()">Iniciar</button>
<button onclick="reiniciar()">Reiniciar</button>

<br><br>

<input id="nombre" placeholder="Nombre del competidor">
<button onclick="registrar()">Registrar tiempo</button>

<h2>Resultados</h2>

<table id="tabla">

<tr>
<th>Competidor</th>
<th>Tiempo (s)</th>
<th>Diferencia con el primero (s)</th>
</tr>

</table>

<script>

let inicio = 0;
let datos = [];

function iniciar(){

inicio = Date.now();
alert("Cronómetro iniciado");

}

function reiniciar(){

inicio = 0;
datos = [];

let tabla = document.getElementById("tabla");

tabla.innerHTML = `
<tr>
<th>Competidor</th>
<th>Tiempo (s)</th>
<th>Diferencia con el primero (s)</th>
</tr>
`;

alert("Cronómetro reiniciado");

}

function registrar(){

if(inicio === 0){
alert("Primero debe iniciar el cronómetro");
return;
}

let nombre = document.getElementById("nombre").value;

if(nombre === ""){
alert("Ingrese el nombre del competidor");
return;
}

let tiempo = ((Date.now() - inicio)/1000).toFixed(2);

datos.push({
nombre:nombre,
tiempo:parseFloat(tiempo)
});

mostrar();

document.getElementById("nombre").value="";

}

function mostrar(){

let tabla = document.getElementById("tabla");

tabla.innerHTML = `
<tr>
<th>Competidor</th>
<th>Tiempo (s)</th>
<th>Diferencia con el primero (s)</th>
</tr>
`;

let primero = Math.min(...datos.map(x=>x.tiempo));

datos.forEach(c=>{

let diferencia = (c.tiempo - primero).toFixed(2);

tabla.innerHTML += `
<tr>
<td>${c.nombre}</td>
<td>${c.tiempo}</td>
<td>${diferencia}</td>
</tr>
`;

});

}

</script>

</body>
</html>
